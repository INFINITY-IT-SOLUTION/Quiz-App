server:
  port: 7777

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/userdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Turkey
    username: igor
    password: admin
    driverClassName: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQL57InnoDBDialect
    hibernate:
      ddl-auto: update
  application:
    name: AUTH-SERVICE
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:9296}
# Configuration pour Google
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: your-google-client-id
            client-secret: your-google-client-secret
            scope: openid,email,profile

          # Configuration pour Facebook
          facebook:
            client-id: your-facebook-client-id
            client-secret: your-facebook-client-secret
            scope: public_profile,email


jwt:
  secret: mySecretKey
  expireMs: 120000
  refrEshexpireMs: 120000

springfox:
  documentation:
    swagger-ui:
      enabled: true
